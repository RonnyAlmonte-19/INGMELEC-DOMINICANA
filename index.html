<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>⚡</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ingmelec Dominicana - Plataforma ERP industrial de control de brigadas, técnicos, inventario maestro, reposiciones, swaps, actas de entrega, auditoría y jerarquía operativa." />
    <meta name="theme-color" content="#f28524" />
    <title>Ingmelec Dominicana - ERP & Control Logístico</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.backgroundColor = '#ef4444';
        errDiv.style.color = '#ffffff';
        errDiv.style.padding = '20px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '14px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.3)';
        errDiv.innerHTML = '<strong>❌ ERROR RUNTIME DETECTADO:</strong><br/>' + event.message + '<br/><br/><strong>Stack:</strong><br/>' + (event.error ? event.error.stack : 'No stack trace');
        document.body.appendChild(errDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.position = 'fixed';
        errDiv.style.top = '0';
        errDiv.style.left = '0';
        errDiv.style.width = '100%';
        errDiv.style.backgroundColor = '#f59e0b';
        errDiv.style.color = '#ffffff';
        errDiv.style.padding = '20px';
        errDiv.style.zIndex = '999999';
        errDiv.style.fontFamily = 'monospace';
        errDiv.style.fontSize = '14px';
        errDiv.style.whiteSpace = 'pre-wrap';
        errDiv.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.3)';
        errDiv.innerHTML = '<strong>⚠️ PROMESA RECHAZADA SIN MANEJO:</strong><br/>' + event.reason;
        document.body.appendChild(errDiv);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
